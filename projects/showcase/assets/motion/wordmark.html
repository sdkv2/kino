<style>
  /* kino wordmark — registration lock-up. Letters land staggered (blur-rise), the red rule wipes,
     a scan dot travels the rule for the rest of the beat, and the annotation types on (steps()).
     All @keyframes are scrubbed by kino across the beat; sub-timing lives in the % stops. */
  .stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: var(--kino-font);
  }
  .word {
    display: flex; font-size: 330px; font-weight: 600; letter-spacing: -0.035em; line-height: 1;
    color: transparent; -webkit-text-stroke: 3px var(--kino-white);
  }
  .word span {
    animation-name: glyph; animation-timing-function: var(--kino-ease-out);
    --kino-delay: calc((sibling-index() - 1) * 0.055);
  }
  @keyframes glyph {
    0%   { opacity: 0; transform: translateY(90px) scale(0.96); filter: blur(14px); }
    30%  { opacity: 1; transform: none; filter: blur(0); }
    100% { opacity: 1; transform: none; filter: blur(0); }
  }
  .ruleWrap { position: relative; width: 560px; height: 4px; margin: 42px 0 30px; }
  .rule {
    position: absolute; inset: 0; background: var(--kino-green); transform-origin: left center;
    animation-name: rulewipe; animation-timing-function: var(--kino-ease-in-out);
  }
  @keyframes rulewipe {
    0% { transform: scaleX(0); } 22% { transform: scaleX(0); }
    42% { transform: scaleX(1); } 100% { transform: scaleX(1); }
  }
  .dot {
    position: absolute; top: 50%; left: 0; width: 14px; height: 14px; margin-top: -7px;
    border-radius: 50%; background: var(--kino-green);
    animation-name: scan; animation-timing-function: var(--kino-ease-in-out);
  }
  @keyframes scan {
    0% { opacity: 0; transform: translateX(0); } 40% { opacity: 0; transform: translateX(0); }
    46% { opacity: 1; } 94% { opacity: 1; transform: translateX(546px); }
    100% { opacity: 0; transform: translateX(546px); }
  }
  .anno {
    font-family: monospace; font-size: 33px; letter-spacing: 0.06em; color: var(--kino-gold);
    white-space: nowrap; overflow: hidden; border-right: 3px solid var(--kino-green);
    animation-name: type;
  }
  @keyframes type {
    0% { width: 0; } 38% { width: 0; animation-timing-function: steps(28, end); }
    72% { width: 28ch; } 100% { width: 28ch; }
  }
</style>
<div class="stage">
  <div class="word"><span class="kino-anim">k</span><span class="kino-anim">i</span><span class="kino-anim">n</span><span class="kino-anim">o</span></div>
  <div class="ruleWrap"><div class="rule kino-anim"></div><div class="dot kino-anim"></div></div>
  <div class="anno kino-anim">/ˈkiːnoʊ/ · motion, authored</div>
</div>
