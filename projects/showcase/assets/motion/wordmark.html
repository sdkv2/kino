<style>

    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: var(--kino-font);
  }
  .word {
    font-size: 320px; font-weight: 600; letter-spacing: -0.035em; line-height: 1;
    color: transparent; -webkit-text-stroke: 3px var(--kino-white);
