<style>
  /* Crosshair that rotates into alignment and pops on each word (--pulse). Crisp SVG. */
  .wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .reticle {
    width: 46vw; height: 46vw;
    opacity: var(--pulse, 0);
    transform: scale(calc(0.82 + var(--pulse, 0) * 0.24)) rotate(calc((1 - var(--pulse, 0)) * 16deg));
  }
  .reticle svg { width: 100%; height: 100%; overflow: visible; }
  .ink { stroke: var(--kino-white); fill: none; }
  .dot { fill: var(--kino-green); }
</style>
<div class="wrap"><div class="reticle">
  <svg viewBox="-200 -200 400 400">
    <line class="ink" x1="0" y1="-200" x2="0" y2="-66" stroke-width="7"/>
    <line class="ink" x1="0" y1="200" x2="0" y2="66" stroke-width="7"/>
    <line class="ink" x1="-200" y1="0" x2="-66" y2="0" stroke-width="7"/>
    <line class="ink" x1="200" y1="0" x2="66" y2="0" stroke-width="7"/>
    <circle class="ink" r="44" stroke-width="4"/>
    <circle class="dot" r="13"/>
  </svg>
</div></div>
