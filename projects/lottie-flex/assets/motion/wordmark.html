<style>
  /* kino wordmark reveal — outlined letters, a red registration rule, mono annotation. Frame-driven by
     --progress (0→1 across the beat) via calc(); no transition/animation. Sits on the marksman frame. */
  .stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: var(--kino-font);
  }
  .word {
    font-size: 320px; font-weight: 600; letter-spacing: -0.035em; line-height: 1;
    color: transparent; -webkit-text-stroke: 3px var(--kino-white);
    opacity: clamp(0, calc((var(--progress) - 0.10) * 6), 1);
    transform: translateY(calc((1 - clamp(0, calc((var(--progress) - 0.10) * 6), 1)) * 50px));
  }
  .rule {
    width: 540px; height: 4px; background: var(--kino-green); margin: 36px 0 30px;
    transform: scaleX(clamp(0, calc((var(--progress) - 0.24) * 4), 1)); transform-origin: left center;
  }
  .anno {
    font-family: monospace; font-size: 33px; letter-spacing: 0.06em; color: var(--kino-gold);
    opacity: clamp(0, calc((var(--progress) - 0.42) * 5), 1);
  }
</style>
<div class="stage">
  <div class="word">kino</div>
  <div class="rule"></div>
  <div class="anno">/ˈkiːnoʊ/ · motion, authored</div>
</div>
