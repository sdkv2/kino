<style>
  /* Rifle-scope target — crisp SVG, ink + signal-red, brand-bound. Pops on each word via --pulse
     (kino raises --pulse to 1 at every trigger and decays it). No transition/JS — frame-driven. */
  .wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .reticle {
    width: 60vw; height: 60vw;
    opacity: var(--pulse, 0);
    transform: scale(calc(0.84 + var(--pulse, 0) * 0.2));
  }
  .reticle svg { width: 100%; height: 100%; overflow: visible; }
  .ink { stroke: var(--kino-white); fill: none; }
  .red { stroke: var(--kino-green); fill: none; }
  .dot { fill: var(--kino-green); stroke: none; }
</style>
<div class="wrap"><div class="reticle">
  <svg viewBox="-200 -200 400 400">
    <circle class="ink" r="182" stroke-width="3"/>
    <circle class="ink" r="120" stroke-width="3"/>
    <circle class="red" r="60" stroke-width="6"/>
    <line class="ink" x1="0" y1="-198" x2="0" y2="-150" stroke-width="4"/>
    <line class="ink" x1="0" y1="198" x2="0" y2="150" stroke-width="4"/>
    <line class="ink" x1="-198" y1="0" x2="-150" y2="0" stroke-width="4"/>
    <line class="ink" x1="198" y1="0" x2="150" y2="0" stroke-width="4"/>
    <circle class="dot" r="10"/>
  </svg>
</div></div>
