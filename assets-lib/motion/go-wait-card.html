<style>
  .stage{position:absolute;inset:0;overflow:hidden;font-family:var(--kino-font);color:var(--kino-white);
         background:radial-gradient(ellipse at 50% 30%, #0f2a44 0%, var(--kino-night) 72%)}
  .wrap{position:absolute;left:0;right:0;top:46%;transform:translateY(-50%);
        display:flex;flex-direction:column;align-items:center}
  .chip{font-family:var(--kino-label-font, var(--kino-font));font-size:2.6vw;letter-spacing:.34em;
        text-transform:uppercase;color:var(--kino-gold);margin-bottom:4vw;
        opacity:clamp(0, calc(var(--progress) * 8), 1)}
  .status{font-size:19vw;font-weight:800;line-height:1;color:var(--kino-mint);
          text-shadow:0 0 6vw rgba(79,224,200,.5);
          opacity:clamp(0, calc((var(--progress) - .12) * 7), 1);
          transform:scale(calc(.82 + clamp(0, calc((var(--progress) - .12) * 7), 1) * .18))}
  .track{width:64vw;height:1.6vw;border-radius:999px;background:rgba(243,239,227,.14);
         margin-top:5vw;overflow:hidden;position:relative;
         opacity:clamp(0, calc((var(--progress) - .32) * 6), 1)}
  .window{position:absolute;left:26%;width:34%;height:100%;border-radius:999px;
          background:linear-gradient(90deg, var(--kino-mint), var(--kino-gold))}
  .sub{margin-top:3.6vw;font-family:var(--kino-label-font, var(--kino-font));font-size:4.4vw;
       letter-spacing:.03em;color:rgba(243,239,227,.85);
       opacity:clamp(0, calc((var(--progress) - .48) * 6), 1)}
  .sub b{color:var(--kino-mint)}
</style>
<div class="stage">
  <div class="wrap">
    <div class="chip">Cloudbreak &middot; SW 4ft</div>
    <div class="status">GO</div>
    <div class="track"><div class="window"></div></div>
    <div class="sub"><b>6:40&ndash;8:10</b> &middot; good window</div>
  </div>
</div>
