<style>
  /* Authored in vw units: render canvas is 1080px wide so 1vw = 10.8px. Frame-driven only —
     no CSS transitions; motion comes from --progress / --pct / --pulse / --t. */
  .stage{position:absolute;inset:0;font-family:var(--kino-font);color:var(--kino-white);overflow:hidden;
         opacity:clamp(0, calc((1 - var(--progress)) * 12), 1)}
  /* warm hob glow behind the dial, breathing off --t and punched by --pulse */
  .glow{position:absolute;left:50%;top:34%;width:104vw;height:104vw;margin:-52vw;border-radius:50%;pointer-events:none;
        background:radial-gradient(circle, rgba(226,59,30,.5), rgba(255,106,47,.22) 40%, transparent 66%);
        opacity:calc(.28 + var(--pulse) * .5 + (sin(var(--t) * 2.2) * .5 + .5) * .12)}
  /* whole graphic lifted so the lower-third caption band stays clear */
  .wrap{position:absolute;left:0;right:0;top:0;bottom:calc(var(--kino-caption-bottom) + 40px);
        display:flex;flex-direction:column;align-items:center;justify-content:center}
  /* cook-timer dial: a ring that fills from 12 o'clock to --pct, easing in */
  .dial{position:relative;width:54vw;height:54vw;border-radius:50%;
        background:conic-gradient(from -90deg, var(--kino-mint) calc(var(--pct) * 1%), rgba(255,244,232,.13) 0);
        -webkit-mask:radial-gradient(circle, transparent 41%, #000 42%);
        mask:radial-gradient(circle, transparent 41%, #000 42%);
        filter:drop-shadow(0 1vw 2.4vw rgba(0,0,0,.45));
        opacity:clamp(0, calc(var(--progress) * 8), 1);
        transform:scale(calc(.9 + clamp(0, calc(var(--progress) * 8), 1) * .1 + var(--pulse) * .04))}
  /* the number sits inside the ring */
  .face{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;
        opacity:clamp(0, calc((var(--progress) - .12) * 9), 1)}
  .num{font-size:19vw;font-weight:900;line-height:.82;letter-spacing:-.03em;
       filter:drop-shadow(0 .5vw 1.2vw rgba(0,0,0,.4))}
  .num b{color:var(--kino-mint)}
  .min{margin-top:.4vw;font-size:4.4vw;font-weight:900;letter-spacing:.42em;text-transform:uppercase;
       color:var(--kino-white)}
  .cap{margin-top:3.4vw;font-size:3.4vw;font-weight:900;letter-spacing:.4em;text-transform:uppercase;
       color:var(--kino-green);
       opacity:clamp(0, calc((var(--progress) - .28) * 9), 1);
       transform:translateY(calc((1 - clamp(0, calc((var(--progress) - .28) * 9), 1)) * 2.4vw))}
</style>
<div class="stage">
  <div class="glow"></div>
  <div class="wrap">
    <div class="dial"></div>
    <div class="face">
      <div class="num"><b>20</b></div>
      <div class="min">min</div>
    </div>
    <div class="cap">till dinner</div>
  </div>
</div>
