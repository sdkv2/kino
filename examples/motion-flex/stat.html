<style>
  /* Authored in vw (width-relative) units, not px: the kino render canvas is 1080px wide, so 1vw = 10.8px
     and every value below resolves to its intended pixel size in the video — but the whole graphic now
     scales to ANY width, so a standalone preview at any panel size stays faithful (nothing clips). */
  .stage{position:absolute;inset:0;font-family:var(--kino-font);color:var(--kino-white);overflow:hidden;
         opacity:clamp(0, calc((1 - var(--progress)) * 10), 1)}
  .card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .label{font-size:2.778vw;font-weight:800;letter-spacing:.36em;text-transform:uppercase;color:var(--kino-mint);
         opacity:clamp(0, calc(var(--progress) * 11), 1);
         transform:translateY(calc((1 - clamp(0, calc(var(--progress) * 11), 1)) * 1.667vw))}
  .big{position:relative;display:flex;align-items:flex-start;line-height:1;font-weight:900;
       font-size:35.185vw;letter-spacing:-.045em;margin:.37vw 0 1.111vw;
       opacity:clamp(0, calc((var(--progress) - .05) * 8), 1);
       transform:translateY(calc((1 - clamp(0, calc((var(--progress) - .05) * 8), 1)) * 2.778vw + sin(var(--t) * 0.9) * -.463vw))
                 scale(calc(.92 + clamp(0, calc((var(--progress) - .05) * 8), 1) * .08))}
  /* gradient-filled number + a glow that pulses on triggers */
  /* background-IMAGE (not the shorthand) so background-clip:text isn't reset → the gradient clips to the glyphs */
  .num,.pc{background-image:linear-gradient(180deg, #ffffff 0%, #cfe9dd 100%);-webkit-background-clip:text;background-clip:text;
           color:transparent;
           filter:drop-shadow(0 0 calc(2.407vw + (sin(var(--t) * 1.1) * .5 + .5) * 3.148vw + var(--pulse) * 6.481vw) rgba(128,226,180, calc(.3 + var(--pulse) * .4)))}
  .num::after{counter-reset: n round(down, var(--pct), 1);content:counter(n)}
  .pc{font-size:13.333vw;margin-top:3.889vw;background-image:linear-gradient(180deg, var(--gold) 0%, #b9791a 100%)}
  .track{position:relative;margin-top:2.407vw;width:70.37vw;height:2.037vw;border-radius:9.167vw;
         background:rgba(255,255,255,.06);overflow:hidden;box-shadow:inset 0 0 0 .093vw rgba(255,255,255,.08);
         opacity:clamp(0, calc((var(--progress) - .14) * 9), 1)}
  .fill{position:relative;height:100%;border-radius:9.167vw;width:calc(var(--pct) * 1%);
        background:linear-gradient(90deg, var(--kino-green), var(--kino-mint));
        box-shadow:0 0 calc(.741vw + var(--pulse) * 2.222vw) rgba(128,226,180,.7)}
  /* sheen sweeping along the bar off --t */
  .fill::after{content:"";position:absolute;inset:0;border-radius:9.167vw;
        background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,.55) 50%, transparent 100%);
        background-size:45% 100%;background-repeat:no-repeat;
        background-position:calc(var(--t) * 70% - 22%) 0}
  .cap{margin-top:3.148vw;font-size:3.056vw;font-weight:700;letter-spacing:.05em;color:#9fb1c9;display:flex;gap:0}
  /* keyword stagger via scrubbed @keyframes (.kino-anim) + sibling-index() → --kino-delay */
  @keyframes kwin{0%{opacity:0;transform:translateY(1.481vw);filter:blur(.556vw)}
                  22%{opacity:1;transform:translateY(0);filter:blur(0)}
                  100%{opacity:1;transform:translateY(0);filter:blur(0)}}
  .kw{animation-name:kwin; --kino-delay:calc((sibling-index() - 1) * .05 + .2)}
  .kw:not(:last-child)::after{content:" · ";color:#5b6b86}
  .vig{position:absolute;inset:0;pointer-events:none;
       background:radial-gradient(ellipse 80% 68% at 50% 46%, transparent 46%, rgba(4,7,14,.55))}
  /* beat 2 of 3 */
  .beat{position:absolute;bottom:18.148vw;left:0;right:0;display:flex;gap:1.204vw;justify-content:center;
        opacity:clamp(0, calc(var(--progress) * 6), 1)}
  .beat i{width:1.204vw;height:1.204vw;border-radius:9.167vw;background:rgba(255,255,255,.16)}
  .beat i.on{width:4.259vw;background:var(--kino-mint)}
</style>
<div class="stage">
  <div class="card">
    <div class="label">render determinism</div>
    <div class="big"><span class="num"></span><span class="pc">%</span></div>
    <div class="track"><div class="fill"></div></div>
    <div class="cap"><span class="kw kino-anim">frame-perfect</span><span class="kw kino-anim">cache-friendly</span><span class="kw kino-anim">agent-safe</span></div>
  </div>
  <div class="vig"></div>
  <div class="beat"><i></i><i class="on"></i><i></i></div>
</div>
