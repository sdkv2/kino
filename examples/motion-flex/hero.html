<style>
  .stage{position:absolute;inset:0;font-family:var(--kino-font);color:var(--kino-white);overflow:hidden;
         opacity:clamp(0, calc((1 - var(--progress)) * 10), 1)}      /* exit fade only in the last 10% */
  /* soft brand glow, breathing off --t + swelling on --pulse */
  .glow{position:absolute;left:50%;top:42%;width:1340px;height:1340px;margin:-670px;border-radius:50%;
        background:radial-gradient(circle, var(--kino-mint), transparent 60%);
        opacity:calc(.05 + (sin(var(--t) * 0.8) * .5 + .5) * .07 + var(--pulse) * .16);
        transform:scale(calc(.95 + var(--pulse) * .12 + sin(var(--t) * 0.7) * .03))}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .kicker{font-size:31px;font-weight:800;letter-spacing:.44em;text-transform:uppercase;color:var(--kino-mint);
          opacity:var(--kick);transform:translateY(calc((1 - var(--kick)) * -26px))}
  .kicker::before,.kicker::after{content:"";display:inline-block;width:36px;height:2px;vertical-align:middle;
          margin:0 20px;background:linear-gradient(90deg, transparent, var(--kino-mint))}
  .kicker::after{background:linear-gradient(90deg, var(--kino-mint), transparent)}
  .head{margin:26px 0 0;text-align:center;line-height:.88;font-weight:900;font-size:214px;letter-spacing:-.025em}
  /* scrubbed @keyframes (.kino-anim): a blur+rise reveal, the two lines staggered via --kino-delay */
  @keyframes rise{0%{opacity:0;transform:translateY(94px);filter:blur(16px)}
                  26%{opacity:1;transform:translateY(0);filter:blur(0)}
                  100%{opacity:1;transform:translateY(0);filter:blur(0)}}
  .line{display:block;overflow:hidden;padding:0 10px;animation-name:rise}
  .l1{--kino-delay:.05}
  .l2{--kino-delay:.13}
  .grad{background:linear-gradient(102deg, var(--kino-white) 0%, var(--kino-mint) 42%, var(--gold) 62%, var(--kino-white) 100%);
        background-size:260% 100%;background-position:calc(var(--t) * -13%) 0;
        -webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{height:6px;margin-top:42px;border-radius:99px;width:calc(var(--rule) * 540px);
        background:linear-gradient(90deg, var(--kino-mint), var(--gold));
        box-shadow:0 0 calc(8px + var(--pulse) * 22px) var(--kino-mint)}
  .sub{margin-top:30px;font-size:28px;font-weight:700;letter-spacing:.22em;color:#9fb1c9;
       opacity:var(--sub);transform:translateY(calc((1 - var(--sub)) * 14px))}
  /* edge vignette for depth */
  .vig{position:absolute;inset:0;pointer-events:none;
       background:radial-gradient(ellipse 80% 68% at 50% 42%, transparent 46%, rgba(4,7,14,.55))}
  /* beat indicator — this is beat 1 of 3 */
  .beat{position:absolute;bottom:196px;left:0;right:0;display:flex;gap:13px;justify-content:center;
        opacity:clamp(0, calc(var(--progress) * 6), 1)}
  .beat i{width:13px;height:13px;border-radius:99px;background:rgba(255,255,255,.16)}
  .beat i.on{width:46px;background:var(--kino-mint)}
</style>
<div class="stage">
  <div class="glow"></div>
  <div class="wrap">
    <div class="kicker">feature flex</div>
    <h1 class="head">
      <span class="line l1 kino-anim"><span class="grad">MOTION</span></span>
      <span class="line l2 kino-anim"><span class="grad">GRAPHICS</span></span>
    </h1>
    <div class="rule"></div>
    <div class="sub">AUTHORED IN HTML · DRIVEN BY JSON</div>
  </div>
  <div class="vig"></div>
  <div class="beat"><i class="on"></i><i></i><i></i></div>
</div>
