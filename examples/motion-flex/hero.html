<style>
  .stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
         font-family:var(--kino-font);color:var(--kino-white);overflow:hidden;
         /* whole-beat exit fade (last ~12%) so it crossfades into the next beat */
         opacity:clamp(0, calc((1 - var(--progress)) * 8), 1)}
  /* glow breathes slowly off --t and swells gently on trigger pulses */
  .glow{position:absolute;width:1320px;height:1320px;border-radius:50%;
        background:radial-gradient(circle, var(--kino-mint), transparent 60%);
        opacity:calc(.06 + (sin(var(--t) * 0.9) * .5 + .5) * .08 + var(--pulse) * .16);
        transform:scale(calc(.94 + var(--pulse) * .14 + sin(var(--t) * 0.8) * .035))}
  /* entrances read easeInOut-eased params (--kick/--t1/--t2/--rule/--sub) from the spec — smooth, no bounce */
  .kicker{font-size:34px;font-weight:800;letter-spacing:.36em;text-transform:uppercase;color:var(--kino-mint);
          opacity:var(--kick);transform:translateY(calc((1 - var(--kick)) * -30px))}
  .head{margin:20px 0 0;text-align:center;line-height:.9;font-weight:900;font-size:210px;letter-spacing:-.02em}
  .line{display:block;overflow:hidden;padding:0 8px}
  .l1{opacity:var(--t1);transform:translateY(calc((1 - var(--t1)) * 105px))}
  .l2{opacity:var(--t2);transform:translateY(calc((1 - var(--t2)) * 105px))}
  /* slow gradient sheen drifting across the letters off --t */
  .grad{background:linear-gradient(105deg, var(--kino-white) 0%, var(--kino-mint) 38%, var(--gold) 58%, var(--kino-white) 100%);
        background-size:280% 100%;background-position:calc(var(--t) * -16%) 0;
        -webkit-background-clip:text;background-clip:text;color:transparent}
  .rule{height:9px;width:560px;margin-top:36px;border-radius:99px;
        background:linear-gradient(90deg, var(--kino-mint), var(--gold));
        transform:scaleX(var(--rule));transform-origin:left}
  .sub{margin-top:30px;font-size:31px;font-weight:700;letter-spacing:.14em;color:#9fb1c9;
       opacity:var(--sub);transform:translateY(calc((1 - var(--sub)) * 16px))}
</style>
<div class="stage">
  <div class="glow"></div>
  <div class="kicker">kino · feature flex</div>
  <h1 class="head">
    <span class="line l1"><span class="grad">MOTION</span></span>
    <span class="line l2"><span class="grad">GRAPHICS</span></span>
  </h1>
  <div class="rule"></div>
  <div class="sub">AUTHORED IN HTML · DRIVEN BY JSON</div>
</div>
