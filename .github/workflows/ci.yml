name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # Tests are mock-based; no Chrome needed. Saves ~150MB download per job.
  PUPPETEER_SKIP_DOWNLOAD: "true"

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # prepare script runs tsc + page bundle during npm ci, so dist/ is built here
      - run: npm ci
      - run: npm test
      # CLI smoke test: verifies compiled dist/ actually boots on this OS/node
      - run: node bin/kino.mjs --version
