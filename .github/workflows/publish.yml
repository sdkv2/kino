name: Publish to npm

# Publishes @sdkv2/kino when you cut a GitHub Release.
# Version published = whatever is in package.json, so bump it before releasing.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public --loglevel http # auth via OIDC, provenance automatic
